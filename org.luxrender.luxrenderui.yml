app-id: org.luxrender.luxrenderui
runtime: org.kde.Platform
runtime-version: 5.15-24.08
sdk: org.kde.Sdk
command: luxrender

finish-args:
  - --device=dri
  - --share=network
  - --share=ipc
  - --socket=x11
  - --socket=wayland
  - --filesystem=host:rw

cleanup:
  - /include
  - /lib/pkgconfig
  - /lib/cmake0
  - /share/cmake
  - /share/doc
  - /bin/exr*

modules:

# This script requires the zlib, bzip2, lzma, jpeg, openjpeg, tiff, tiff-compat, png, freetype, and fftw development packages to be installed at the system level.

# Additionally, Qt5 Core, Gui, Widgets, and Imageformats are required for GUI functionality.

# Old Python requires an older OpenSSL version.

  - name: OpenSSL
    buildsystem: simple
    build-commands:
      - ./config shared -fPIC -w -std=c++14
      - make install INSTALL_PREFIX=/app INSTALLTOP=/
    post-install:
      - chmod --recursive 777 $FLATPAK_DEST/lib/*
    build-options:
      no-debuginfo: true
      no-debuginfo-compression: true
    sources:
      - type: archive
        path: deps/openssl-1.0.2.tar.xz

  - name: IlmBase
    buildsystem: cmake
    build-options:
      cxxflags: -w -std=c++14
      ldflags: -Wl,-rpath,$ORIGIN
      no-debuginfo: true
      no-debuginfo-compression: true
    subdir:
      IlmBase
    sources: &openexr_sources
      - type: archive
        path: deps/openexr-2.2.0.tar.xz

  - name: OpenEXR
    buildsystem: cmake
    build-options:
      cxxflags: -w -std=c++14 -I /app/include/OpenEXR
      ldflags: -Wl,-rpath,$ORIGIN
      no-debuginfo: true
      no-debuginfo-compression: true
    subdir:
      OpenEXR
    sources:
      *openexr_sources

  - name: FreeImage
    buildsystem: simple
    build-commands:
      - make -j"${FLATPAK_BUILDER_N_JOBS}"
      - make INSTALLDIR=/app/lib install
    build-options:
      no-debuginfo: true
      no-debuginfo-compression: true
    sources:
      - type: archive
        path: deps/freeimage-3.18.0.tar.xz
      - type: patch
        path: patches/freeimage/freeimage-paths.patch
  
  - name: Python3
    buildsystem: simple
    build-commands:
      - ./configure --prefix=/app --with-openssl=/app/bin --enable-shared --with-ensurepip=no
      - make install -j"${FLATPAK_BUILDER_N_JOBS}" LD_RUN_PATH=$ORIGIN cc=g++ cxx=g++ cxxflags="-O2 -w -fPIC -std=c++14 -I /app/bin -I /app/include/openssl -fpermissive"
    post-install:
      - chmod 644 $FLATPAK_DEST/lib/libpython3.5m.so.1.0
      - chmod 644 $FLATPAK_DEST/lib/libpython3.so
    build-options:
      no-debuginfo: true
      no-debuginfo-compression: true
    sources:
      - type: archive
        path: deps/Python-3.5.10.tar.xz

# Build a minimal Qt5 to support the updated GUI.

  - name: Qt5
    buildsystem: simple
    build-options:
      cxxflags: -w -std=c++14
      ldflags: -Wl,-rpath,$ORIGIN
      no-debuginfo: true
      no-debuginfo-compression: true
    build-commands:
      - ./configure -prefix "/app" -release -opensource -nomake examples -nomake tests -no-icu
      - make install -j "${FLATPAK_BUILDER_N_JOBS}"
    sources:
      - type: archive
        path: deps/qtbase-everywhere-opensource-src-5.15.18.tar.xz

# The node editor preview leaks memory on 1.80 but not on 1.79.
# The leak could be in asyncstream.cpp asyncstream.h renderfarm.cpp renderfarm.h 
# UNLIKELY to be renderserver.cpp

  - name: Boost
    buildsystem: simple
    build-commands:
      - ./bootstrap.sh --prefix=/app --with-python=/app/bin/python3 --with-python-root=/app
      - ./b2 install --with-program_options --with-regex --with-filesystem --with-system --with-thread --with-serialization --with-iostreams --with-python --with-chrono hardcode-dll-paths=true dll-path="'\$ORIGIN'" variant=release link=static runtime-link=static threading=multi cflags="-fPIC" cxxflags="-fPIC -I /app/include/python3.5m" -j"${FLATPAK_BUILDER_N_JOBS}"
    build-options:
      no-debuginfo: true
      no-debuginfo-compression: true
    sources:
      - type: archive
        path: deps/boost_1_79_0.tar.xz

# Using the modified LuxRays is REQUIRED; https://github.com/LuxRender/LuxRays will NOT build.

  - name: LuxRays
    buildsystem: cmake
    build-options:
      cxxflags: -w -O2 -march=nocona -mtune=haswell -std=c++14 -msse2 -mfpmath=sse -pipe -pthread -DBOOST_BIND_GLOBAL_PLACEHOLDERS -DHAVE_PTHREAD_H -DCMAKE_BUILD_TYPE=Release -L /app/lib -I /app/include/python3.5m -I /usr/include/gtk-3.0 -I /usr/include/gtk-3.0/gtk -I /usr/include/glib-2.0 -I /usr/lib/x86_64-linux-gnu/glib-2.0/include/ -I /usr/include/pango-1.0/ -I /usr/include/harfbuzz -I /usr/include/cairo -I /usr/include/gdk-pixbuf-2.0 -I /usr/include/atk-1.0
      cflags: -L /app/lib -lpython3.5m -I /app/include/python3.5m -L /usr/lib/x86_64-linux-gnu -lpthread -lgobject-2.0 -lgtk-3 -lglib-2.0 -I /usr/include/gtk-3.0 -I /usr/include/gtk-3.0/gtk -I /usr/include/glib-2.0 -I /usr/lib/x86_64-linux-gnu/glib-2.0/include/ -I /usr/include/pango-1.0/ -I /usr/include/harfbuzz -I /usr/include/cairo -I /usr/include/gdk-pixbuf-2.0 -I /usr/include/atk-1.0
      ldflags: -Wl,-rpath,$ORIGIN/shared
      no-debuginfo: true
      no-debuginfo-compression: true
    config-opts:
      - -D PYTHON_INCLUDE_DIR=/app/include/python3.5m
      - -D PYTHON_LIBRARY=/app/lib/libpython3.5m.so
      - -D OpenEXR_Imath_INCLUDE_DIR=/app/include/OpenEXR/
      - -D OpenEXR_half_INCLUDE_DIR=/app/include/OpenEXR/
      - -D BOOST_ROOT=/app/lib/
      - -D Boost_USE_STATIC_LIBS=ON
      - -D Boost_USE_STATIC_RUNTIME=ON
    no-make-install: true
    post-install:
      - mkdir -pv /app/include
      - cp -av include/. /app/include/.
      - mkdir -pv /app/lib
      - cp -av lib/. /app/lib/.
      - cp -rv ${FLATPAK_BUILDER_BUILDDIR}/lib/* /app/lib/
    sources:
      - type: dir
        path: LuxRays/

# Using the modified Lux is REQUIRED; https://github.com/LuxRender/Lux will NOT build.

  - name: LuxRender
    buildsystem: cmake
    build-options:
      cxxflags: -w -O2 -march=nocona -mtune=haswell -std=c++14 -msse2 -mfpmath=sse -pipe -pthread -DBOOST_BIND_GLOBAL_PLACEHOLDERS -DHAVE_PTHREAD_H -DCMAKE_BUILD_TYPE=Release -L /app/lib -I /app/bin -I /app/lib -I /app/include/python3.5m -I /app/lib/cmake/ -L /usr/lib/x86_64-linux-gnu
      ldflags: -Wl,-rpath,$ORIGIN/shared
      no-debuginfo: true
      no-debuginfo-compression: true
    builddir: true
    config-opts:
      - -D LuxRays_HOME=/app/lib/
      - -D LUX_DOCUMENTATION=OFF
      - -D PYTHON_CUSTOM=TRUE
      - -D PYTHON_INCLUDE_PATH=/app/include/python3.5m/
      - -D PYTHON_LIBRARIES=/app/lib/libpython3.5m.so
      - -D LUX_USE_FREEIMAGE=ON
      - -D FREEIMAGE_INCLUDE_DIR=/app/include/
      - -D OpenEXR_Imath_INCLUDE_DIR=/app/include/OpenEXR/
      - -D OpenEXR_half_INCLUDE_DIR=/app/include/OpenEXR/
      - -D CMAKE_FIND_PACKAGE_PREFER_CONFIG=TRUE
      - -D LUXRAYS_DISABLE_OPENCL=TRUE
      - -D BOOST_ROOT=/app/lib/
      - -D Boost_USE_STATIC_LIBS=ON
      - -D Boost_USE_STATIC_RUNTIME=ON
    post-install:
      - cp -rv ${FLATPAK_BUILDER_BUILDDIR}/_flatpak_build/* /app/bin/
    sources:
      - type: dir
        path: Lux/

# Install the app. The extract-binaries.sh script can now be used to create a standalone LuxRender.

  - name: metadata
    buildsystem: simple
    build-commands:
       - install -Dm0644 -t /app/share/metainfo/ org.luxrender.luxrenderui.metainfo.xml
       - install -Dm0644 -t /app/share/applications/ org.luxrender.luxrenderui.desktop
       - install -Dm0644 -t /app/share/icons/hicolor/64x64/apps/ org.luxrender.luxrenderui.png
       - install -Dm0644 -t /app/usr/share/icons/hicolor/64x64/apps/ org.luxrender.luxrenderui.png
    build-options:
      no-debuginfo: true
      no-debuginfo-compression: true
    sources:
      - type: file
        path: org.luxrender.luxrenderui.metainfo.xml
      - type: file
        path: org.luxrender.luxrenderui.desktop
      - type: file
        path: org.luxrender.luxrenderui.png
