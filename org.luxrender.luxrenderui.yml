app-id: org.luxrender.luxrenderui
runtime: org.kde.Platform
runtime-version: 6.9
sdk: org.kde.Sdk
command: luxrender

finish-args:
  - --device=dri
  - --share=network
  - --share=ipc
  - --socket=x11
  - --socket=wayland
  - --filesystem=host:rw

cleanup:
  - /include
  - /lib/pkgconfig
  - /lib/cmake0
  - /share/cmake
  - /share/doc
  - /bin/exr*

modules:

# LuxRender requires Flatpak and Flatpak builder. To run the LuxRender UI, Qt6 core, dbus, gui, imageformats, and widgets are required.

  - name: IlmBase
    buildsystem: cmake
    build-options:
      cxxflags: -w -std=c++14
      no-debuginfo: true
      no-debuginfo-compression: true
    subdir:
      IlmBase
    sources: &openexr_sources
      - type: archive
        url: https://github.com/AcademySoftwareFoundation/openexr/archive/refs/tags/v2.2.2.tar.gz
        sha256: f99dab62c4275cd30dc48ab3cf27db892d7cd76b09e6606ffb90f7b05863566e
      - type: patch
        path: patches/openexr/openexr-limits.patch

  - name: OpenEXR
    buildsystem: cmake
    build-options:
      cxxflags: -w -std=c++14 -I /app/include/OpenEXR
      no-debuginfo: true
      no-debuginfo-compression: true
    subdir:
      OpenEXR
    sources:
      *openexr_sources

  - name: FreeImage
    buildsystem: simple
    build-commands:
      - make -j"${FLATPAK_BUILDER_N_JOBS}"
      - make INSTALLDIR=/app/lib install
    build-options:
      no-debuginfo: true
      no-debuginfo-compression: true
    sources:
      - type: archive
        url: http://downloads.sourceforge.net/freeimage/FreeImage3180.zip
        sha256: f41379682f9ada94ea7b34fe86bf9ee00935a3147be41b6569c9605a53e438fd
      - type: patch
        path: patches/freeimage/freeimage-paths.patch

  # Old Python requires an older OpenSSL version.

  - name: OpenSSL
    buildsystem: simple
    build-commands:
      - ./config shared no-dsw no-hw -w -fPIC
      - make install INSTALL_PREFIX=/app INSTALLTOP=/
    build-options:
      no-debuginfo: true
      no-debuginfo-compression: true
    sources:
      - type: archive
        url: https://github.com/openssl/openssl/releases/download/OpenSSL_1_0_2u/openssl-1.0.2u.tar.gz
        sha256: ecd0c6ffb493dd06707d38b14bb4d8c2288bb7033735606569d8f90f89669d16

  - name: Python3
    buildsystem: simple
    build-commands:
      - ./configure --prefix=/app --with-openssl=/app/bin --enable-shared --with-ensurepip=no
      - make install -j"${FLATPAK_BUILDER_N_JOBS}" LD_RUN_PATH=$ORIGIN cc=g++ cxx=g++ cxxflags="-w -fPIC -std=c++14 -I /app/bin -I /app/include/openssl -fpermissive"
    post-install:
      - chmod 644 $FLATPAK_DEST/lib/libpython3.5m.so.1.0
      - chmod 644 $FLATPAK_DEST/lib/libpython3.so
    build-options:
      no-debuginfo: true
      no-debuginfo-compression: true
    sources:
      - type: archive
        url: https://www.python.org/ftp/python/3.5.10/Python-3.5.10.tar.xz
        sha256: 0f0fa8685c1dc1f1dacb0b4e7779796b90aef99dc1fa4967a71b9da7b57d4a28

# The node editor preview leaks memory on 1.80 but not on 1.79.
# The leak could be in asyncstream.cpp asyncstream.h renderfarm.cpp renderfarm.h 
# UNLIKELY to be renderserver.cpp

  - name: Boost
    buildsystem: simple
    build-commands:
      - ./bootstrap.sh --prefix=/app --with-python=/app/bin/python3 --with-python-root=/app
      - ./b2 install --with-program_options --with-regex --with-filesystem --with-system --with-thread --with-serialization --with-iostreams --with-python --with-chrono hardcode-dll-paths=true dll-path="'\$ORIGIN'" variant=release link=static runtime-link=static threading=multi cflags="-w -fPIC" cxxflags="-w -fPIC -I /app/include/python3.5m" -j"${FLATPAK_BUILDER_N_JOBS}"
    build-options:
      no-debuginfo: true
      no-debuginfo-compression: true
    sources:
      - type: archive
        url: https://archives.boost.io/release/1.90.0/source/boost_1_90_0.tar.bz2
        sha256: 49551aff3b22cbc5c5a9ed3dbc92f0e23ea50a0f7325b0d198b705e8ee3fc305

# Using the modified LuxRays is REQUIRED; https://github.com/LuxRender/LuxRays will NOT build.

  - name: LuxRays
    buildsystem: cmake
    build-options:
      cxxflags: -w -march=nocona -mtune=haswell -std=c++14 -DBOOST_BIND_GLOBAL_PLACEHOLDERS -DCMAKE_BUILD_TYPE=Release -L /app/lib -I /app/include/python3.5m
      no-debuginfo-compression: true
    config-opts:
      - -D PYTHON_INCLUDE_DIR=/app/include/python3.5m
      - -D PYTHON_LIBRARY=/app/lib/libpython3.5m.so
      - -D OpenEXR_Imath_INCLUDE_DIR=/app/include/OpenEXR/
      - -D OpenEXR_half_INCLUDE_DIR=/app/include/OpenEXR/
      - -D BOOST_ROOT=/app/lib/
      - -D Boost_USE_STATIC_LIBS=ON
      - -D Boost_USE_STATIC_RUNTIME=ON
    no-make-install: true
    post-install:
      - mkdir -pv /app/include
      - cp -av include/. /app/include/.
      - mkdir -pv /app/lib
      - cp -av lib/. /app/lib/.
      - cp -rv ${FLATPAK_BUILDER_BUILDDIR}/lib/* /app/lib/
    sources:
      - type: dir
        path: LuxRays/

# Using the modified Lux is REQUIRED; https://github.com/LuxRender/Lux will NOT build.

  - name: LuxRender
    buildsystem: cmake
    build-options:
      cxxflags:  -w -march=nocona -mtune=haswell -std=c++14 -DBOOST_BIND_GLOBAL_PLACEHOLDERS -DCMAKE_BUILD_TYPE=Release -L /app/lib -I /app/bin -I /app/lib -I /app/include/python3.5m -I /app/lib/cmake/
      no-debuginfo: true
      no-debuginfo-compression: true
    builddir: true
    config-opts:
      - -D LuxRays_HOME=/app/lib/
      - -D LUX_DOCUMENTATION=OFF
      - -D PYTHON_CUSTOM=TRUE
      - -D PYTHON_INCLUDE_PATH=/app/include/python3.5m/
      - -D PYTHON_LIBRARIES=/app/lib/libpython3.5m.so
      - -D LUX_USE_FREEIMAGE=ON
      - -D FREEIMAGE_INCLUDE_DIR=/app/include/
      - -D OpenEXR_Imath_INCLUDE_DIR=/app/include/OpenEXR/

      - -D CMAKE_FIND_PACKAGE_PREFER_CONFIG=TRUE
      - -D BOOST_ROOT=/app/lib/
      - -D Boost_USE_STATIC_LIBS=ON
      - -D Boost_USE_STATIC_RUNTIME=ON
    post-install:
      - cp -rv ${FLATPAK_BUILDER_BUILDDIR}/_flatpak_build/* /app/bin/
    sources:
      - type: dir
        path: Lux/

# The gather-binaries.sh script can now be used to create a standalone LuxRender.

  - name: metadata
    buildsystem: simple
    build-commands:
       - install -Dm0644 -t /app/share/metainfo/ org.luxrender.luxrenderui.metainfo.xml
       - install -Dm0644 -t /app/share/applications/ org.luxrender.luxrenderui.desktop
       - install -Dm0644 -t /app/share/icons/hicolor/64x64/apps/ org.luxrender.luxrenderui.png
       - install -Dm0644 -t /app/usr/share/icons/hicolor/64x64/apps/ org.luxrender.luxrenderui.png
    build-options:
      no-debuginfo: true
      no-debuginfo-compression: true
    sources:
      - type: file
        path: flathub/org.luxrender.luxrenderui.metainfo.xml
      - type: file
        path: flathub/org.luxrender.luxrenderui.desktop
      - type: file
        path: flathub/org.luxrender.luxrenderui.png
